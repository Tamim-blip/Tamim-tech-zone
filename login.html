<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h2>Give the information to confirm the order</h2>
    <form action="login.php" method="post">
        <label for="name">Name:</label>
        <input type="text" placeholder="Enter your name" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" placeholder="Enter your email" id="email" name="email" required><br><br>

        <label for="address">Address:</label>
        <input type="text" placeholder="Enter your address" id="address" name="address" required><br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" placeholder="Enter your phone number" id="phone" name="phone" required><br>
        <h3>Payment Method:</h3>
        <label>
            <input type="radio" name="payment Method" value="Bikash" required> Bikash
        </label>
        <label>
            <input type="radio" name="payment Method" value="Nagad" required> Nagad
        </label>

        <label>
            <input type="radio" name="payment Method" value="Cash on Delivery" required> Cash on Delivery
        </label><br>
        <h2>Drop your message here</h2><br>
        <textarea cols="50" rows="4" name="message" placeholder="Drop your message here"></textarea><br>
    </form>

        <input  type="submit" value="Submit" onclick="window.location.href='confurm.html'">
        
</body>
</html>
